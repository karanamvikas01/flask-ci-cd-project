version: 0.2

phases:
  install:
    commands:
      - echo Installing dependencies...
      - pip install -r requirements.txt

      # Setup SSH
      - mkdir -p ~/.ssh
      - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa

      # Verify SSH key
      - ssh-keygen -l -f ~/.ssh/id_rsa

      # Add EC2 host to known_hosts
      - ssh-keyscan -H 16.112.18.209 >> ~/.ssh/known_hosts

  build:
    commands:
      - echo Build started...
      - python -m py_compile app.py

  post_build:
    commands:
      - echo Deployment started...
      - ssh ec2-user@16.112.18.209 'cd /home/ec2-user/flask-cicd-project && git pull && pkill -f app.py || true && nohup python3 app.py > output.log 2>&1 < /dev/null &'

artifacts:
  files:
    - '**/*'